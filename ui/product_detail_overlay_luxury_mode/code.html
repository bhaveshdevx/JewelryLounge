<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product Detail Overlay - Jewelry Lounge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bd0f2c", // Deep Maroon / Red as requested by theme config
                        "emerald": "#064e3b", // Custom emerald for the specific request
                        "emerald-dark": "#022c22", 
                        "gold": "#d4af37", // Custom gold for accents
                        "gold-light": "#f3e5ab",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221013", // Theme default dark
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Serif", "serif"] // Forcing serif as per "Luxury Mode" request
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display h-screen w-full overflow-hidden flex justify-center items-center">
<!-- Background simulator (the app behind the drawer) -->
<div class="fixed inset-0 w-full h-full bg-[url('https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center blur-sm opacity-30" data-alt="blurred wedding venue background"></div>
<!-- Bottom Sheet Container -->
<div class="relative flex h-full w-full max-w-md flex-col overflow-hidden shadow-2xl mx-auto rounded-t-xl z-10">
<!-- Scrim -->
<div class="absolute inset-0 bg-black/40 pointer-events-none"></div>
<!-- Sheet Content -->
<div class="absolute bottom-0 left-0 w-full h-[95%] flex flex-col bg-emerald-dark rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] overflow-hidden border-t border-gold/20">
<!-- Handle -->
<div class="flex items-center justify-center pt-4 pb-2 bg-emerald-dark shrink-0 z-20">
<div class="h-1.5 w-12 rounded-full bg-gold/40"></div>
</div>
<!-- Scrollable Area -->
<div class="flex-1 overflow-y-auto hide-scrollbar relative">
<!-- Hero Image Carousel -->
<div class="relative w-full aspect-[4/5] bg-emerald-900">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1599643478518-17488fbbcd75?q=80&amp;w=1887&amp;auto=format&amp;fit=crop')] bg-cover bg-center" data-alt="cinematic closeup of emerald earrings on bride">
<!-- Gradient Overlay for text readability at bottom of image -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-emerald-dark"></div>
</div>
<!-- Carousel Indicators -->
<div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2">
<div class="h-1.5 w-6 rounded-full bg-gold shadow-lg"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/50 backdrop-blur-sm"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/50 backdrop-blur-sm"></div>
</div>
<!-- Floating Badge -->
<div class="absolute top-4 left-4 bg-gold/90 backdrop-blur text-emerald-dark px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest border border-white/20 shadow-lg">
                        Bridal Suite
                    </div>
</div>
<!-- Product Info Section -->
<div class="px-6 pt-2 pb-24 bg-emerald-dark text-center">
<div class="flex justify-between items-start mb-2">
<!-- Empty div for flex balance -->
<div class="w-6"></div>
<!-- Title & Price -->
<div class="flex flex-col items-center">
<h1 class="text-gold-light text-3xl font-medium tracking-wide leading-tight mb-2">Vintage Emerald Drops</h1>
<div class="flex items-center gap-3">
<span class="text-gold text-xl font-semibold">$1,250</span>
<span class="text-emerald-500/60 text-sm line-through decoration-emerald-500/60">$1,800</span>
</div>
</div>
<!-- Share Action -->
<button class="text-gold/70 hover:text-gold w-6">
<span class="material-symbols-outlined text-[24px]">ios_share</span>
</button>
</div>
<!-- Divider -->
<div class="w-12 h-[1px] bg-gold/30 mx-auto my-6"></div>
<!-- Description -->
<p class="text-emerald-100/80 text-sm leading-relaxed font-light italic mb-8 max-w-xs mx-auto">
                        "A timeless statement for your special day. Hand-selected Zambian emeralds suspended in 18k brushed gold settings."
                    </p>
<!-- Expandable Details -->
<div class="space-y-4">
<button class="w-full flex items-center justify-between py-4 border-t border-gold/10 group">
<span class="text-gold-light font-medium tracking-wide">Materials &amp; Care</span>
<span class="material-symbols-outlined text-gold/50 group-hover:text-gold transition-colors">add</span>
</button>
<button class="w-full flex items-center justify-between py-4 border-t border-gold/10 group">
<span class="text-gold-light font-medium tracking-wide">Shipping &amp; Returns</span>
<span class="material-symbols-outlined text-gold/50 group-hover:text-gold transition-colors">add</span>
</button>
</div>
<!-- Recommended Pairing -->
<div class="mt-8 text-left">
<h3 class="text-gold/60 text-xs uppercase tracking-[0.2em] mb-4 text-center">Complete the Look</h3>
<div class="flex gap-4 overflow-x-auto pb-4 hide-scrollbar snap-x">
<div class="snap-center shrink-0 w-32 flex flex-col gap-2 group cursor-pointer">
<div class="w-32 h-40 rounded-lg overflow-hidden relative border border-gold/10">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1602751584552-8ba420055a29?q=80&amp;w=1887&amp;auto=format&amp;fit=crop')] bg-cover bg-center transition-transform duration-500 group-hover:scale-110" data-alt="gold emerald bracelet"></div>
</div>
<p class="text-emerald-100 text-xs text-center truncate px-1">Royal Cuff</p>
<p class="text-gold/80 text-xs text-center">$850</p>
</div>
<div class="snap-center shrink-0 w-32 flex flex-col gap-2 group cursor-pointer">
<div class="w-32 h-40 rounded-lg overflow-hidden relative border border-gold/10">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center transition-transform duration-500 group-hover:scale-110" data-alt="diamond and emerald ring"></div>
</div>
<p class="text-emerald-100 text-xs text-center truncate px-1">Halo Ring</p>
<p class="text-gold/80 text-xs text-center">$2,100</p>
</div>
<div class="snap-center shrink-0 w-32 flex flex-col gap-2 group cursor-pointer">
<div class="w-32 h-40 rounded-lg overflow-hidden relative border border-gold/10">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1599643477877-5313537056a5?q=80&amp;w=1887&amp;auto=format&amp;fit=crop')] bg-cover bg-center transition-transform duration-500 group-hover:scale-110" data-alt="emerald necklace"></div>
</div>
<p class="text-emerald-100 text-xs text-center truncate px-1">Pendant</p>
<p class="text-gold/80 text-xs text-center">$950</p>
</div>
</div>
</div>
</div>
</div>
<!-- Sticky Action Bar -->
<div class="absolute bottom-0 left-0 w-full bg-emerald-dark/95 backdrop-blur-md border-t border-gold/20 p-4 pb-8 z-30 flex items-center gap-4">
<!-- Bookmark Button -->
<button class="h-14 w-14 flex items-center justify-center rounded-xl border border-gold/30 bg-emerald-950 text-gold hover:bg-gold/10 transition-colors shrink-0">
<span class="material-symbols-outlined text-[28px]">bookmark_border</span>
</button>
<!-- Add to Cart Button -->
<button class="flex-1 h-14 rounded-xl bg-primary hover:bg-red-800 text-gold-light font-bold text-lg tracking-wide uppercase shadow-[0_4px_20px_rgba(189,15,44,0.3)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 border border-gold/20">
<span>Add to Bag</span>
<span class="w-1 h-1 rounded-full bg-gold-light/50"></span>
<span class="text-sm font-normal opacity-90">$1,250</span>
</button>
</div>
</div>
</div>
</body></html>
